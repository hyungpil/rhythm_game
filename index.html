<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fruit Rhythm Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --vh: 1vh;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Urbanist', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* ── 상단 스텝 트래커 ── */
        #header-bar {
            flex: 0 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        }

        /* ── 메시지 영역 ── */
        #msg-area {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #msg-overlay {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 900;
            color: #facc15;
            pointer-events: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            min-height: 1.8em;
            line-height: 1;
        }

        /* ── 과일 슬롯 그리드 ── */
        #slots-area {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            min-height: 0;
        }

        #slots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(0.35rem, 2vw, 0.75rem);
            width: 100%;
            max-width: 320px;
        }

        /* ── 버튼 영역 ── */
        #buttons-area {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.3);
            padding: 0 1rem;
        }

        #button-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(0.35rem, 2vw, 0.75rem);
            width: 100%;
            max-width: 320px;
        }

        /* ── 카드 공통 ── */
        .fruit-card {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: clamp(0.6rem, 3vw, 1.25rem);
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(71, 85, 105, 0.5);
            transition: all 0.08s ease-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            user-select: none;
            -webkit-user-select: none;
            font-size: clamp(1.2rem, 6vw, 2rem);
            font-weight: bold;
        }

        .active-card {
            background: #facc15 !important;
            border-color: #fef08a !important;
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.5);
            color: #0f172a;
        }

        .success-card {
            background: #22c55e !important;
            border-color: #4ade80 !important;
            transform: scale(0.95);
            opacity: 0.5;
            transition: all 0.1s ease-out;
        }

        /* ── 스텝 인디케이터 ── */
        .step-dot {
            width: clamp(10px, 3vw, 14px);
            height: clamp(10px, 3vw, 14px);
            border-radius: 50%;
            background: #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .step-dot.active {
            background: #facc15;
            box-shadow: 0 0 12px #facc15;
            transform: scale(1.25);
        }
        .step-line {
            flex-grow: 1;
            height: 2px;
            background: #334155;
            transition: background 0.3s ease;
        }
        .step-line.active {
            background: rgba(250, 204, 21, 0.4);
        }

        @keyframes zoomResult {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        .animate-result { animation: zoomResult 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* ── 정중앙 플래시 오버레이 ── */
        #center-flash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 90;
        }
        #center-flash-text {
            font-size: clamp(3.5rem, 18vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            text-shadow: 0 0 40px currentColor, 0 4px 20px rgba(0,0,0,0.6);
            opacity: 0;
            transform: scale(0.4);
            transition: none;
        }
        @keyframes flashPop {
            0%   { opacity: 0;    transform: scale(0.4); }
            30%  { opacity: 1;    transform: scale(1.15); }
            60%  { opacity: 1;    transform: scale(1); }
            100% { opacity: 0;    transform: scale(0.9); }
        }
        .flash-anim {
            animation: flashPop 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        body { touch-action: none; -webkit-tap-highlight-color: transparent; }

        /* ── 버튼 카드 추가 스타일 ── */
        .btn-card {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(71, 85, 105, 0.6);
            cursor: pointer;
        }
        .btn-card:active {
            background: rgba(51, 65, 85, 0.9);
            border-color: rgba(100, 116, 139, 0.7);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="game-container" class="text-white">

        <!-- 스텝 트래커 -->
        <div id="header-bar">
            <div class="w-full max-w-xs flex items-center justify-between py-2">
                <div id="step-1" class="step-dot active"></div>
                <div id="line-1" class="step-line"></div>
                <div id="step-2" class="step-dot"></div>
                <div id="line-2" class="step-line"></div>
                <div id="step-3" class="step-dot"></div>
                <div id="line-3" class="step-line"></div>
                <div id="step-4" class="step-dot"></div>
                <div id="line-4" class="step-line"></div>
                <div id="step-5" class="step-dot"></div>
            </div>
            <div class="pb-1 text-[9px] font-black tracking-widest text-slate-500 uppercase">Stage Progress</div>
        </div>

        <!-- 작은 메시지 (사용 안 함 – 레이아웃 여백만 유지) -->
        <div id="msg-area" style="padding: clamp(0.2rem, 1vh, 0.4rem) 0; visibility:hidden;">
            <div id="msg-overlay"></div>
        </div>

        <!-- 과일 슬롯 -->
        <div id="slots-area">
            <div id="slots-grid">
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div>
            </div>
        </div>

        <!-- 버튼 -->
        <div id="buttons-area" style="padding: clamp(0.5rem, 3vh, 1.2rem) 1rem;">
            <div id="button-container"></div>
        </div>
    </div>

    <!-- 정중앙 플래시 오버레이 -->
    <div id="center-flash">
        <span id="center-flash-text"></span>
    </div>

    <!-- 메인 오버레이 -->
    <div id="main-overlay" class="fixed inset-0 bg-slate-950/98 flex flex-col items-center justify-center z-[100] p-8 text-center text-white">
        <h1 id="overlay-title" class="text-4xl font-black text-yellow-400 mb-2 italic tracking-wide">FRUIT RHYTHM</h1>
        <p id="overlay-desc" class="text-slate-400 mb-8 text-sm leading-relaxed">박자에 맞춰 하이라이트 카드를 따라 누르세요.<br>1~3단계는 기본 연습, <span class="text-red-400 font-bold">4단계부터 극악의 속도</span>가 시작됩니다.</p>
        <button id="start-btn" onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-16 rounded-2xl text-xl shadow-2xl active:scale-95 transition-all duration-75">GAME START</button>
    </div>

    <script>
        // ── 동적 뷰포트 높이 계산 ──
        function setScreenSize() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setScreenSize();
        window.addEventListener('resize', setScreenSize);
        window.addEventListener('orientationchange', () => { setTimeout(setScreenSize, 100); });

        // ── 정중앙 플래시 표시 ──
        const centerFlash     = document.getElementById('center-flash');
        const centerFlashText = document.getElementById('center-flash-text');
        let flashTimer = null;

        function showCenterFlash(text, color) {
            if (flashTimer) clearTimeout(flashTimer);
            centerFlashText.textContent = text;
            centerFlashText.style.color = color;
            // 애니메이션 재실행을 위해 클래스 리셋
            centerFlashText.classList.remove('flash-anim');
            void centerFlashText.offsetWidth; // reflow
            centerFlashText.classList.add('flash-anim');
            flashTimer = setTimeout(() => {
                centerFlashText.classList.remove('flash-anim');
                centerFlashText.style.opacity = '0';
            }, 560);
        }

        // ── Web Audio API 컨텍스트 ──
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        /**
         * Electric Whistle 합성
         * - 두 개의 고주파 사인파를 약간 디튠 → 살짝 "떨리는" 전기적 질감
         * - 밴드패스 필터링된 화이트 노이즈 → 공기감/크리스프함
         * - 짧은 Attack + 빠른 Decay → 경쾌하고 날카로운 단음
         */
        function playWhistle() {
            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            const FREQ      = 3200;   // 기본 주파수 (Hz) – 밝고 높은 음
            const DETUNE    = 18;     // 두 번째 오실레이터 디튠 (Hz)
            const DURATION  = 0.18;   // 총 소리 길이 (초)
            const ATTACK    = 0.008;  // 어택 (초)
            const DECAY     = 0.12;   // 디케이 (초)

            // ── 마스터 게인 ──
            const masterGain = ctx.createGain();
            masterGain.gain.setValueAtTime(0.001, now);
            masterGain.gain.linearRampToValueAtTime(0.55, now + ATTACK);
            masterGain.gain.exponentialRampToValueAtTime(0.001, now + ATTACK + DECAY);
            masterGain.connect(ctx.destination);

            // ── 오실레이터 1 (기본 주파수) ──
            const osc1 = ctx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(FREQ, now);
            // 약간의 피치 슬라이드 → 더 살아있는 느낌
            osc1.frequency.linearRampToValueAtTime(FREQ * 1.015, now + ATTACK);
            osc1.frequency.linearRampToValueAtTime(FREQ * 0.98, now + ATTACK + DECAY);

            const osc1Gain = ctx.createGain();
            osc1Gain.gain.value = 0.6;
            osc1.connect(osc1Gain);
            osc1Gain.connect(masterGain);

            // ── 오실레이터 2 (디튠 – Electric 질감) ──
            const osc2 = ctx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(FREQ + DETUNE, now);
            osc2.frequency.linearRampToValueAtTime((FREQ + DETUNE) * 1.015, now + ATTACK);
            osc2.frequency.linearRampToValueAtTime((FREQ + DETUNE) * 0.98, now + ATTACK + DECAY);

            const osc2Gain = ctx.createGain();
            osc2Gain.gain.value = 0.35;
            osc2.connect(osc2Gain);
            osc2Gain.connect(masterGain);

            // ── 오실레이터 3 (배음 – 2x, 밝기 강화) ──
            const osc3 = ctx.createOscillator();
            osc3.type = 'triangle';
            osc3.frequency.setValueAtTime(FREQ * 2, now);

            const osc3Gain = ctx.createGain();
            osc3Gain.gain.value = 0.15;
            osc3.connect(osc3Gain);
            osc3Gain.connect(masterGain);

            // ── 화이트 노이즈 (크리스프한 공기감) ──
            const bufSize = ctx.sampleRate * DURATION * 1.5;
            const noiseBuf = ctx.createBuffer(1, Math.ceil(bufSize), ctx.sampleRate);
            const noiseData = noiseBuf.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = ctx.createBufferSource();
            noiseSource.buffer = noiseBuf;

            // 밴드패스 필터 – 휘슬 주파수 대역만 남김
            const bpFilter = ctx.createBiquadFilter();
            bpFilter.type = 'bandpass';
            bpFilter.frequency.value = FREQ;
            bpFilter.Q.value = 12;

            const noiseGain = ctx.createGain();
            noiseGain.gain.value = 0.12;

            noiseSource.connect(bpFilter);
            bpFilter.connect(noiseGain);
            noiseGain.connect(masterGain);

            // ── 약한 WaveShaper로 Electric Distortion 느낌 ──
            const waveshaper = ctx.createWaveShaper();
            const curve = new Float32Array(256);
            for (let i = 0; i < 256; i++) {
                const x = (i * 2) / 256 - 1;
                curve[i] = (Math.PI + 120) * x / (Math.PI + 120 * Math.abs(x));
            }
            waveshaper.curve = curve;
            waveshaper.oversample = '2x';

            // 오실레이터들을 waveshaper 통과 후 masterGain으로
            // (subtle – gain은 낮게)
            const wsGain = ctx.createGain();
            wsGain.gain.value = 0.08;
            osc1.connect(waveshaper);
            waveshaper.connect(wsGain);
            wsGain.connect(masterGain);

            // ── 모든 노드 시작/종료 ──
            const endTime = now + DURATION;
            osc1.start(now); osc1.stop(endTime);
            osc2.start(now); osc2.stop(endTime);
            osc3.start(now); osc3.stop(endTime);
            noiseSource.start(now); noiseSource.stop(endTime);
        }

        // ── 게임 데이터 ──
        const FRUITS = [
            { id: 'apple',  icon: '🍎' },
            { id: 'banana', icon: '🍌' },
            { id: 'grape',  icon: '🍇' },
            { id: 'orange', icon: '🍊' }
        ];

        const LEVEL_CONFIG = {
            1: { bpm: 60,  poolSize: 1 },
            2: { bpm: 75,  poolSize: 2 },
            3: { bpm: 90,  poolSize: 3 },
            4: { bpm: 155, poolSize: 4 },
            5: { bpm: 210, poolSize: 4 }
        };

        let state = {
            level: 1,
            sequence: [],
            currentIndex: 0,
            isPlaying: false,
            canInput: false,
            beatStartTime: 0,
            beatDuration: 0
        };

        const slots     = document.querySelectorAll('.slot');
        const msgOverlay = document.getElementById('msg-overlay');
        const mainOverlay = document.getElementById('main-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc  = document.getElementById('overlay-desc');

        function initButtons() {
            const container = document.getElementById('button-container');
            container.innerHTML = '';
            FRUITS.forEach(fruit => {
                const btn = document.createElement('div');
                btn.className = "fruit-card btn-card";
                btn.innerHTML = fruit.icon;

                const triggerInput = (e) => {
                    e.preventDefault();
                    handleInput(fruit.id);
                };
                btn.addEventListener('touchstart', triggerInput, { passive: false });
                btn.addEventListener('mousedown',  triggerInput);
                container.appendChild(btn);
            });
        }

        function startGame() {
            // 오디오 컨텍스트 미리 활성화 (모바일 자동 재생 차단 해제)
            getAudioCtx();

            mainOverlay.classList.add('hidden');
            state.level = 1;
            initButtons();
            startLevel();
        }

        async function startLevel() {
            state.isPlaying = false;
            updateStepTracker();
            state.sequence = generateSequence();

            slots.forEach((slot, i) => {
                slot.innerHTML = state.sequence[i].icon;
                slot.className = "slot fruit-card";
            });

            await runCountdown();

            state.currentIndex  = 0;
            state.isPlaying     = true;
            state.beatDuration  = 60000 / LEVEL_CONFIG[state.level].bpm;
            state.beatStartTime = performance.now();

            updateBeatHighlight();
            requestAnimationFrame(gameLoop);
        }

        function updateStepTracker() {
            for (let i = 1; i <= 5; i++) {
                const dot  = document.getElementById(`step-${i}`);
                const line = document.getElementById(`line-${i}`);

                if (i === state.level) {
                    dot.className = "step-dot active";
                    dot.style.opacity = "1";
                } else if (i < state.level) {
                    dot.className = "step-dot";
                    dot.style.background = "#6366f1";
                    dot.style.boxShadow  = "0 0 8px rgba(99,102,241,0.6)";
                    dot.style.opacity    = "0.6";
                    if (line) { line.className = "step-line active"; }
                } else {
                    dot.className        = "step-dot";
                    dot.style.background = "";
                    dot.style.boxShadow  = "";
                    dot.style.opacity    = "1";
                    if (line) line.className = "step-line";
                }
            }
        }

        function generateSequence() {
            const config = LEVEL_CONFIG[state.level];
            return Array(8).fill(null).map(() => FRUITS[Math.floor(Math.random() * config.poolSize)]);
        }

        const COUNTDOWN_COLORS = {
            '3':      '#f87171', // red-400
            '2':      '#fb923c', // orange-400
            '1':      '#facc15', // yellow-400
            'START!': '#4ade80', // green-400
        };

        function runCountdown() {
            return new Promise(resolve => {
                const counts   = ['3', '2', '1', 'START!'];
                let i          = 0;
                const interval = 60000 / LEVEL_CONFIG[state.level].bpm;
                const playBeat = () => {
                    if (i < counts.length) {
                        showCenterFlash(counts[i], COUNTDOWN_COLORS[counts[i]] || '#facc15');
                        playWhistle();
                        i++;
                        setTimeout(playBeat, interval);
                    } else {
                        resolve();
                    }
                };
                playBeat();
            });
        }

        function updateBeatHighlight() {
            if (state.currentIndex >= 8) return;
            slots.forEach((s, idx) => {
                if (idx < state.currentIndex) {
                    s.className = "slot fruit-card success-card";
                } else {
                    s.className = "slot fruit-card";
                }
            });
            slots[state.currentIndex].classList.add('active-card');
            playWhistle();
            state.canInput = true;
        }

        function gameLoop(timestamp) {
            if (!state.isPlaying) return;
            const elapsed = timestamp - state.beatStartTime;

            if (elapsed >= state.beatDuration) {
                if (state.canInput) {
                    gameOver("박자를 놓쳤습니다!");
                    return;
                }
                state.beatStartTime += state.beatDuration;
                if (state.currentIndex >= 8) {
                    levelClear();
                } else {
                    updateBeatHighlight();
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function handleInput(id) {
            if (!state.isPlaying || !state.canInput) return;
            state.canInput = false;

            if (id === state.sequence[state.currentIndex].id) {
                if (navigator.vibrate) navigator.vibrate(15);
                slots[state.currentIndex].className = "slot fruit-card success-card";
                state.currentIndex++;
            } else {
                gameOver("틀린 과일을 선택했습니다!");
            }
        }

        const CLEAR_MSGS = [
            { text: 'EXCELLENT!', color: 'text-yellow-300' },
            { text: 'PERFECT!',   color: 'text-pink-400'   },
            { text: 'GREAT!',     color: 'text-green-400'  },
            { text: 'AMAZING!',   color: 'text-cyan-400'   },
            { text: 'AWESOME!',   color: 'text-orange-400' },
            { text: 'SUPERB!',    color: 'text-purple-400' },
        ];

        function levelClear() {
            state.isPlaying = false;
            slots.forEach(s => s.className = "slot fruit-card success-card");
            const pick = CLEAR_MSGS[Math.floor(Math.random() * CLEAR_MSGS.length)];
            // color 클래스에서 실제 hex 값으로 매핑
            const colorMap = {
                'text-yellow-300': '#fde047',
                'text-pink-400':   '#f472b6',
                'text-green-400':  '#4ade80',
                'text-cyan-400':   '#22d3ee',
                'text-orange-400': '#fb923c',
                'text-purple-400': '#c084fc',
            };
            showCenterFlash(pick.text, colorMap[pick.color] || '#facc15');

            setTimeout(() => {
                msgOverlay.innerText = '';
                if (state.level < 5) {
                    state.level++;
                    startLevel();
                } else {
                    victory();
                }
            }, 1200);
        }

        function gameOver(reason) {
            state.isPlaying = false;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            overlayTitle.innerText  = "GAME OVER";
            overlayTitle.className  = "text-4xl font-black text-red-500 mb-2 italic tracking-wide";
            overlayDesc.innerHTML   = `${reason}<br><br><span class='text-slate-400 text-lg'>최종 통과 단계: <span class='text-yellow-400 font-black'>Level ${state.level}</span></span>`;
            document.getElementById('start-btn').innerText = "RETRY";
            mainOverlay.classList.remove('hidden');
        }

        function victory() {
            state.isPlaying = false;
            overlayTitle.innerText = "ALL CLEAR!";
            overlayTitle.className = "text-4xl font-black text-green-400 mb-2 italic tracking-wide animate-bounce";
            overlayDesc.innerHTML  = "축하합니다!<br><span class='text-white text-xl font-bold'>당신은 진정한 리듬 마스터입니다!</span>";
            document.getElementById('start-btn').innerText = "PLAY AGAIN";
            mainOverlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
