<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>리듬 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed; /* 모바일 스크롤 및 바운스 현상 원천 차단 */
        }
        #game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; /* iOS 주소창 대응 */
            width: 100%;
        }
        .active-card { 
            border: 6px solid #fbbf24 !important; 
            background-color: #fef3c7 !important; 
            transform: scale(1.05); 
            z-index: 10; 
            color: #000;
        }
        @keyframes zoomResult {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1.3); opacity: 1; }
        }
        .animate-result { animation: zoomResult 0.3s ease-out forwards; }
        body { 
            touch-action: none; /* 모바일 드래그/줌 확대 기능 완전 차단 */
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
            background-color: #0f172a; 
        }
    </style>
</head>
<body>
    <div id="game-container" class="text-white">

        <div class="h-16 flex-shrink-0 px-4 bg-slate-800 flex justify-between items-center shadow-2xl z-10">
            <div class="text-left">
                <p class="text-[10px] text-slate-400 uppercase leading-none">Level</p>
                <p id="level" class="text-xl font-black text-yellow-400">1</p>
            </div>
            <div id="combo-display" class="text-lg font-bold text-blue-400 tracking-wider">READY</div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 uppercase leading-none">Score</p>
                <p id="score" class="text-xl font-black text-green-400">0</p>
            </div>
        </div>

        <div class="flex-1 min-h-0 px-4 py-2 flex flex-col items-center justify-center relative overflow-hidden">
            <div id="msg-overlay" class="absolute inset-0 flex items-center justify-center text-5xl font-black z-30 pointer-events-none text-center drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]"></div>

            <div class="w-full max-w-sm aspect-[4/2] flex flex-col justify-center">
                <div id="grid" class="grid grid-cols-4 grid-rows-2 gap-2 h-full">
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                    <div class="slot bg-slate-700 rounded-xl border-2 border-slate-600 flex items-center justify-center text-3xl shadow-lg transition-all duration-75"></div>
                </div>
            </div>
        </div>

        <div id="button-area" class="flex-shrink-0 bg-slate-800 p-4 pb-6 min-h-[120px] max-h-[25vh] flex items-center justify-center">
            <div id="button-container" class="flex justify-center gap-3 w-full max-w-md h-full items-stretch">
                </div>
        </div>
    </div>

    <div id="main-overlay" class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-[100] p-6 text-center text-white">
        <h1 id="overlay-title" class="text-4xl font-black text-yellow-400 mb-2 italic tracking-wider">RHYTHM GAME</h1>
        <p id="overlay-desc" class="text-slate-400 mb-8 text-sm leading-relaxed">실수하면 즉시 종료!<br>박자에 맞춰 8개의 과일을 클리어하세요.</p>
        <button id="start-btn" onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-12 rounded-full text-xl shadow-2xl active:scale-95 transition-all">START</button>
    </div>

    <script>
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        const FRUITS = [
            { id: 'apple', icon: '🍎' },
            { id: 'banana', icon: '🍌' },
            { id: 'grape', icon: '🍇' },
            { id: 'orange', icon: '🍊' }
        ];

        let state = {
            score: 0,
            level: 1,
            bpm: 50,
            sequence: [],
            currentIndex: 0,
            isPlaying: false,
            canInput: false,
            beatStartTime: 0,
            beatDuration: 0
        };

        const slots = document.querySelectorAll('.slot');
        const msgOverlay = document.getElementById('msg-overlay');
        const mainOverlay = document.getElementById('main-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');

        // 싱글 톤 기반 고정 오디오 이펙트
        function playWhistle() {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') ctx.resume();
                
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.08);
                
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now);
                osc.stop(now + 0.08);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function initButtons() {
            const container = document.getElementById('button-container');
            container.innerHTML = '';
            FRUITS.forEach(fruit => {
                const btn = document.createElement('button');
                // 고정 가로세로 비율 대신 flex-1과 items-stretch를 활용해 컨테이너 크기에 밀착시킴
                btn.className = "flex-1 bg-slate-700 rounded-2xl text-3xl shadow-xl border-b-4 border-slate-900 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center hover:bg-slate-600 select-none";
                btn.innerHTML = fruit.icon;
                
                // 모바일 터치 즉시 반응을 위해 mousedown/touchstart 동시 바인딩
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleInput(fruit.id);
                });
                btn.addEventListener('mousedown', (e) => {
                    handleInput(fruit.id);
                });
                
                container.appendChild(btn);
            });
        }

        function startGame() {
            mainOverlay.classList.add('hidden');
            state.score = 0;
            state.level = 1;
            state.bpm = 50;
            updateUI();
            initButtons();
            startLevel();
        }

        async function startLevel() {
            state.isPlaying = false;
            state.sequence = generateSequence();
            
            slots.forEach((slot, i) => {
                slot.innerHTML = state.sequence[i].icon;
                slot.classList.remove('active-card');
            });

            await runCountdown();
            
            state.currentIndex = 0;
            state.isPlaying = true;
            startBeatTimer();
        }

        function runCountdown() {
            return new Promise(resolve => {
                const counts = ['3', '2', '1', 'GO!'];
                let i = 0;
                const interval = 60000 / state.bpm;
                
                const playBeat = () => {
                    if (i < counts.length) {
                        msgOverlay.innerHTML = `<span class="text-yellow-400 font-black animate-result">${counts[i]}</span>`;
                        playWhistle();
                        i++;
                        setTimeout(playBeat, interval);
                    } else {
                        msgOverlay.innerHTML = '';
                        resolve();
                    }
                };
                playBeat();
            });
        }

        function generateSequence() {
            return Array(8).fill(null).map(() => {
                if (state.level === 1) return FRUITS[0];
                if (state.level === 2) return FRUITS[Math.floor(Math.random() * 2)];
                return FRUITS[Math.floor(Math.random() * 4)];
            });
        }

        // 고정밀 게임 루프 타이머 시작
        function startBeatTimer() {
            state.beatDuration = 60000 / state.bpm;
            state.beatStartTime = performance.now();
            setupNextBeat();
            requestAnimationFrame(gameLoop);
        }

        function setupNextBeat() {
            if (state.currentIndex >= 8) {
                levelClear();
                return;
            }
            slots.forEach(s => s.classList.remove('active-card'));
            slots[state.currentIndex].classList.add('active-card');
            playWhistle();
            state.canInput = true;
        }

        // 밀림 없는 고정밀 루프 검사기
        function gameLoop(timestamp) {
            if (!state.isPlaying) return;

            const elapsed = timestamp - state.beatStartTime;

            if (elapsed >= state.beatDuration) {
                // 시간 초과 시점에 유저가 입력을 처리하지 못했다면 아웃
                if (state.canInput) {
                    gameOver("박자를 놓쳤습니다!");
                    return;
                }
                // 다음 박자로 전진
                state.beatStartTime += state.beatDuration; // 오차 축적 방지
                setupNextBeat();
            }
            requestAnimationFrame(gameLoop);
        }

        function handleInput(id) {
            if (!state.isPlaying || !state.canInput) return;
            
            if (navigator.vibrate) navigator.vibrate(30);
            state.canInput = false; // 이번 박자 입력 마감

            if (id === state.sequence[state.currentIndex].id) {
                state.score += 10;
                updateUI();
                state.currentIndex++;
                
                // 유저가 맞춘 시점에 즉시 다음 비트로 타임스탬프 당기기 시도 방지 및 흐름 유지
            } else {
                gameOver("틀린 과일을 눌렀습니다!");
            }
        }

        function levelClear() {
            state.isPlaying = false;
            slots.forEach(s => s.classList.remove('active-card'));
            
            const results = ['PERFECT!', 'GREAT!', 'AMAZING!'];
            const res = results[Math.floor(Math.random() * results.length)];
            msgOverlay.innerHTML = `<span class="animate-result text-green-400 font-black">${res}</span>`;

            setTimeout(() => {
                msgOverlay.innerHTML = '';
                state.level++;
                state.bpm = Math.min(state.bpm + 10, 140); // 최대 속도 제한
                startLevel();
            }, 1500);
        }

        function gameOver(reason) {
            state.isPlaying = false;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            overlayTitle.innerText = "GAME OVER";
            overlayTitle.classList.replace('text-yellow-400', 'text-red-500');
            overlayDesc.innerHTML = `${reason}<br><br><span class="text-white text-2xl font-bold">최종 점수: ${state.score}</span>`;
            document.getElementById('start-btn').innerText = "TRY AGAIN";
            mainOverlay.classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('level').innerText = state.level;
            document.getElementById('score').innerText = state.score;
        }

        window.addEventListener('load', () => {
            getAudioContext();
        });
    </script>
</body>
</html>
