<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fruit Rhythm Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --vh: 1vh; }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #0f172a; font-family: 'Urbanist', sans-serif;
            position: fixed; top: 0; left: 0;
        }
        #game-container {
            display: flex; flex-direction: column; width: 100%; height: 100vh;
            height: calc(var(--vh, 1vh) * 100); position: relative; z-index: 1; overflow: hidden;
        }
        #header-bar {
            flex: 0 0 auto; padding: 0 1.5rem; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        }
        #msg-area { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
        #msg-overlay {
            font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 900; color: #facc15;
            pointer-events: none; letter-spacing: 0.1em; text-transform: uppercase;
            min-height: 1.8em; line-height: 1;
        }
        #slots-area {
            flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
            padding: 0 1rem; min-height: 0;
        }
        #slots-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: clamp(0.35rem, 2vw, 0.75rem); width: 100%; max-width: 320px;
        }
        #buttons-area {
            flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.3); padding: 0 1rem;
        }
        #button-container {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: clamp(0.35rem, 2vw, 0.75rem); width: 100%; max-width: 320px;
        }
        .fruit-card {
            aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            border-radius: clamp(0.6rem, 3vw, 1.25rem); background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(71, 85, 105, 0.5); transition: all 0.08s ease-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); user-select: none;
            -webkit-user-select: none; font-size: clamp(1.2rem, 6vw, 2rem); font-weight: bold;
        }
        .active-card {
            background: #facc15 !important; border-color: #fef08a !important;
            transform: scale(1.1); z-index: 10; box-shadow: 0 0 25px rgba(250, 204, 21, 0.5); color: #0f172a;
        }
        .success-card {
            background: #22c55e !important; border-color: #4ade80 !important;
            transform: scale(0.95); opacity: 0.5; transition: all 0.1s ease-out;
        }
        .step-dot {
            width: clamp(10px, 3vw, 14px); height: clamp(10px, 3vw, 14px);
            border-radius: 50%; background: #334155; transition: all 0.3s; flex-shrink: 0;
        }
        .step-dot.active { background: #facc15; box-shadow: 0 0 12px #facc15; transform: scale(1.25); }
        .step-line { flex-grow: 1; height: 2px; background: #334155; transition: background 0.3s ease; }
        .step-line.active { background: rgba(250, 204, 21, 0.4); }
        #center-flash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 90; }
        #center-flash-text {
            font-size: clamp(3.5rem, 18vw, 7rem); font-weight: 900; letter-spacing: 0.05em;
            text-shadow: 0 0 40px currentColor, 0 4px 20px rgba(0,0,0,0.6); opacity: 0; transform: scale(0.4);
        }
        @keyframes flashPop {
            0% { opacity: 0; transform: scale(0.4); }
            30% { opacity: 1; transform: scale(1.15); }
            60% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }
        .flash-anim { animation: flashPop var(--flash-dur, 0.55s) cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        body { touch-action: none; -webkit-tap-highlight-color: transparent; }
        .btn-card { background: rgba(30, 41, 59, 0.9); cursor: pointer; }
        .btn-card:active { transform: scale(0.95); background: rgba(51, 65, 85, 0.9); }
    </style>
</head>
<body>
    <div id="game-container" class="text-white">
        <div id="header-bar">
            <div class="w-full max-w-xs flex items-center justify-between py-2">
                <div id="step-1" class="step-dot active"></div><div id="line-1" class="step-line"></div>
                <div id="step-2" class="step-dot"></div><div id="line-2" class="step-line"></div>
                <div id="step-3" class="step-dot"></div><div id="line-3" class="step-line"></div>
                <div id="step-4" class="step-dot"></div><div id="line-4" class="step-line"></div>
                <div id="step-5" class="step-dot"></div>
            </div>
            <div class="pb-1 text-[9px] font-black tracking-widest text-slate-500 uppercase">Stage Progress</div>
        </div>

        <div id="msg-area" style="padding: clamp(0.2rem, 1vh, 0.4rem) 0; visibility:hidden;"><div id="msg-overlay"></div></div>

        <div id="slots-area">
            <div id="slots-grid">
                <div class="slot fruit-card"></div><div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div><div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div><div class="slot fruit-card"></div>
                <div class="slot fruit-card"></div><div class="slot fruit-card"></div>
            </div>
        </div>

        <div id="buttons-area" style="padding: clamp(0.5rem, 3vh, 1.2rem) 1rem;">
            <div id="button-container"></div>
        </div>
    </div>

    <div id="center-flash"><span id="center-flash-text"></span></div>

    <div id="main-overlay" class="fixed inset-0 bg-slate-950/98 flex flex-col items-center justify-center z-[100] p-8 text-center text-white">
        <h1 id="overlay-title" class="text-4xl font-black text-yellow-400 mb-2 italic tracking-wide">FRUIT RHYTHM</h1>
        <p id="overlay-desc" class="text-slate-400 mb-8 text-sm leading-relaxed">박자에 맞춰 하이라이트 카드를 따라 누르세요.<br>1~3단계는 기본 연습, <span class="text-red-400 font-bold">4단계부터 극악의 속도</span>가 시작됩니다.</p>
        <button id="start-btn" onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-16 rounded-2xl text-xl shadow-2xl active:scale-95 transition-all duration-75">GAME START</button>
    </div>

    <script>
        /* =====================================================
           ★ 박자 판정 및 난이도 조절 (Safe Zone) ★
           ===================================================== */
        const JUDGE_SETTINGS = {
            EARLY_MS: 200, // 박자 시작 전 몇 ms부터 입력을 허용할지
            LATE_MS: 200   // 박자 시작 후 몇 ms까지 입력을 허용할지
        };
        /* ===================================================== */

        function setScreenSize() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setScreenSize();
        window.addEventListener('resize', setScreenSize);

        const centerFlashText = document.getElementById('center-flash-text');
        let flashTimer = null;

        function showCenterFlash(text, color, durationMs) {
            if (flashTimer) clearTimeout(flashTimer);
            const dur = durationMs ? Math.max(durationMs * 0.92, 80) : 550;
            document.documentElement.style.setProperty('--flash-dur', `${dur}ms`);
            centerFlashText.textContent = text;
            centerFlashText.style.color = color;
            centerFlashText.classList.remove('flash-anim');
            void centerFlashText.offsetWidth; 
            centerFlashText.classList.add('flash-anim');
        }

        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playWhistle() {
            const ctx = getAudioCtx(); const now = ctx.currentTime;
            const FREQ = 3200; const DURATION = 0.18;
            const masterGain = ctx.createGain();
            masterGain.gain.setValueAtTime(0.001, now);
            masterGain.gain.linearRampToValueAtTime(0.55, now + 0.008);
            masterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.128);
            masterGain.connect(ctx.destination);
            const osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.setValueAtTime(FREQ, now);
            const osc1Gain = ctx.createGain(); osc1Gain.gain.value = 0.6;
            osc1.connect(osc1Gain); osc1Gain.connect(masterGain);
            osc1.start(now); osc1.stop(now + DURATION);
        }

        // 난이도 조절

        const FRUITS = [
            { id: 'apple', icon: '🍎' },
            { id: 'banana', icon: '🍌' },
            { id: 'grape', icon: '🍇' },
            { id: 'orange', icon: '🍊' }
        ];

        const LEVEL_CONFIG = {
            1: { bpm: 60, poolSize: 1 }, 
            2: { bpm: 60, poolSize: 2 },
            3: { bpm: 60, poolSize: 3 }, 
            4: { bpm: 90, poolSize: 4 }, 
            5: { bpm:120, poolSize: 4 }
        };

        let state = {
            level: 1, sequence: [], currentIndex: 0, isPlaying: false,
            canInput: false, beatStartTime: 0, beatDuration: 0,
            hasInputThisBeat: false 
        };

        const slots = document.querySelectorAll('.slot');
        const mainOverlay = document.getElementById('main-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');

        function initButtons() {
            const container = document.getElementById('button-container');
            container.innerHTML = '';
            FRUITS.forEach(fruit => {
                const btn = document.createElement('div');
                btn.className = "fruit-card btn-card";
                btn.innerHTML = fruit.icon;
                const triggerInput = (e) => { e.preventDefault(); handleInput(fruit.id); };
                btn.addEventListener('touchstart', triggerInput, { passive: false });
                btn.addEventListener('mousedown', triggerInput);
                container.appendChild(btn);
            });
        }

        function startGame() {
            getAudioCtx();
            mainOverlay.classList.add('hidden');
            state.level = 1;
            initButtons();
            startLevel();
        }

        async function startLevel() {
            state.isPlaying = false;
            updateStepTracker();
            state.sequence = Array(8).fill(null).map(() => FRUITS[Math.floor(Math.random() * LEVEL_CONFIG[state.level].poolSize)]);
            slots.forEach((slot, i) => { slot.innerHTML = state.sequence[i].icon; slot.className = "slot fruit-card"; });
            
            await runCountdown();
            
            state.currentIndex = 0;
            state.beatDuration = 60000 / LEVEL_CONFIG[state.level].bpm;
            state.beatStartTime = performance.now();
            state.hasInputThisBeat = false;
            state.isPlaying = true;

            updateBeatHighlight();
            requestAnimationFrame(gameLoop);
        }

        function runCountdown() {
            return new Promise(resolve => {
                const counts = ['3', '2', '1', 'START!'];
                let i = 0; const interval = 60000 / LEVEL_CONFIG[state.level].bpm;
                const tick = () => {
                    if (i < counts.length) {
                        showCenterFlash(counts[i], '#facc15', interval);
                        playWhistle(); i++; setTimeout(tick, interval);
                    } else resolve();
                };
                tick();
            });
        }

        function updateBeatHighlight() {
            if (state.currentIndex >= 8) return;
            slots.forEach((s, idx) => {
                if (idx < state.currentIndex) s.className = "slot fruit-card success-card";
                else s.className = "slot fruit-card";
            });
            slots[state.currentIndex].classList.add('active-card');
            playWhistle();
            state.canInput = true;
            state.hasInputThisBeat = false; 
        }

        function gameLoop(timestamp) {
            if (!state.isPlaying) return;
            const elapsed = timestamp - state.beatStartTime;

            // [수정] 실패 판정 로직:
            // 현재 박자에서 아직 입력을 안 했는데, 허용된 LATE_MS 마저 지났을 때만 실패 처리
            if (elapsed > JUDGE_SETTINGS.LATE_MS && !state.hasInputThisBeat) {
                gameOver("박자를 놓쳤습니다!");
                return;
            }

            // 다음 박자로 넘어가는 처리
            if (elapsed >= state.beatDuration) {
                state.beatStartTime += state.beatDuration;
                if (state.currentIndex >= 8) {
                    levelClear();
                } else {
                    updateBeatHighlight();
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function handleInput(id) {
            if (!state.isPlaying || state.hasInputThisBeat) return;

            const now = performance.now();
            const elapsed = now - state.beatStartTime;

            // Safe Zone 판정 (-EARLY_MS ~ +LATE_MS)
            const isInsideSafeZone = (elapsed >= -JUDGE_SETTINGS.EARLY_MS && elapsed <= JUDGE_SETTINGS.LATE_MS);

            if (isInsideSafeZone) {
                if (id === state.sequence[state.currentIndex].id) {
                    // 성공 처리
                    if (navigator.vibrate) navigator.vibrate(15);
                    slots[state.currentIndex].className = "slot fruit-card success-card";
                    state.hasInputThisBeat = true; // 이 박자에서 할 일을 다 했음을 기록
                    state.currentIndex++;
                } else {
                    gameOver("틀린 과일을 선택했습니다!");
                }
            } else {
                // Safe Zone 밖에서 눌렀을 때
                if (elapsed > JUDGE_SETTINGS.LATE_MS) {
                    gameOver("박자가 늦었습니다!");
                }
                // EARLY_MS 보다 너무 일찍 누른 경우는 무시 (혹은 패널티)
            }
        }

        function levelClear() {
            state.isPlaying = false;
            slots.forEach(s => s.className = "slot fruit-card success-card");
            showCenterFlash("CLEAR!", "#4ade80");
            setTimeout(() => {
                if (state.level < 5) { state.level++; startLevel(); }
                else victory();
            }, 1200);
        }

        function gameOver(reason) {
            state.isPlaying = false;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "text-4xl font-black text-red-500 mb-2 italic tracking-wide";
            overlayDesc.innerHTML = `${reason}<br><br><span class='text-slate-400 text-lg'>최종 통과 단계: <span class='text-yellow-400 font-black'>Level ${state.level}</span></span>`;
            document.getElementById('start-btn').innerText = "RETRY";
            mainOverlay.classList.remove('hidden');
        }

        function victory() {
            state.isPlaying = false;
            overlayTitle.innerText = "ALL CLEAR!";
            overlayTitle.className = "text-4xl font-black text-green-400 mb-2 italic tracking-wide animate-bounce";
            overlayDesc.innerHTML = "축하합니다!<br><span class='text-white text-xl font-bold'>당신은 진정한 리듬 마스터입니다!</span>";
            document.getElementById('start-btn').innerText = "PLAY AGAIN";
            mainOverlay.classList.remove('hidden');
        }

        function updateStepTracker() {
            for (let i = 1; i <= 5; i++) {
                const dot = document.getElementById(`step-${i}`);
                const line = document.getElementById(`line-${i}`);
                if (i === state.level) {
                    dot.className = "step-dot active"; dot.style.opacity = "1";
                } else if (i < state.level) {
                    dot.className = "step-dot"; dot.style.background = "#6366f1"; dot.style.opacity = "0.6";
                    if (line) line.className = "step-line active";
                } else {
                    dot.className = "step-dot"; dot.style.background = ""; dot.style.opacity = "1";
                    if (line) line.className = "step-line";
                }
            }
        }
    </script>
</body>
</html>
