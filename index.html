<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fruit Rhythm Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Urbanist', sans-serif;
            position: fixed;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100); 
            position: relative;
            z-index: 1;
        }

        .fruit-card {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.25rem;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(71, 85, 105, 0.5);
            transition: all 0.08s ease-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            user-select: none;
            -webkit-user-select: none;
        }

        .active-card {
            background: #facc15 !important;
            border-color: #fef08a !important;
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.5);
            color: #0f172a;
        }

        .success-card {
            background: #22c55e !important;
            border-color: #4ade80 !important;
            transform: scale(0.95);
            opacity: 0.5;
            transition: all 0.1s ease-out;
        }

        .step-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-dot.active {
            background: #facc15;
            box-shadow: 0 0 12px #facc15;
            transform: scale(1.25);
        }
        .step-line {
            flex-grow: 1;
            height: 2px;
            background: #334155;
            transition: background 0.3s ease;
        }
        .step-line.active {
            background: rgba(250, 204, 21, 0.4);
        }

        @keyframes zoomResult {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        .animate-result { animation: zoomResult 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        body { touch-action: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <audio id="whistle-sound" src="345800__patobottos__whistle.aiff" preload="auto"></audio>

    <div id="game-container" class="text-white">
        
        <div class="h-20 flex-shrink-0 px-10 flex flex-col justify-center items-center bg-slate-900/40 border-b border-slate-800/50">
            <div class="w-full max-w-xs flex items-center justify-between">
                <div id="step-1" class="step-dot active"></div>
                <div id="line-1" class="step-line"></div>
                <div id="step-2" class="step-dot"></div>
                <div id="line-2" class="step-line"></div>
                <div id="step-3" class="step-dot"></div>
                <div id="line-3" class="step-line"></div>
                <div id="step-4" class="step-dot"></div>
                <div id="line-4" class="step-line"></div>
                <div id="step-5" class="step-dot"></div>
            </div>
            <div class="mt-2 text-[10px] font-black tracking-widest text-slate-500 uppercase">Stage Progress</div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center px-6">
            <div id="msg-overlay" class="h-12 text-3xl font-black text-yellow-400 mb-6 pointer-events-none tracking-wider uppercase"></div>
            
            <div class="w-full max-w-xs grid grid-cols-4 gap-3">
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
                <div class="slot fruit-card text-3xl font-bold"></div>
            </div>
        </div>

        <div class="h-1/3 flex-shrink-0 p-6 flex items-center justify-center bg-slate-900/20">
            <div id="button-container" class="w-full max-w-xs grid grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="main-overlay" class="fixed inset-0 bg-slate-950/98 flex flex-col items-center justify-center z-[100] p-8 text-center text-white">
        <h1 id="overlay-title" class="text-4xl font-black text-yellow-400 mb-2 italic tracking-wide">FRUIT RHYTHM</h1>
        <p id="overlay-desc" class="text-slate-400 mb-8 text-sm leading-relaxed">박자에 맞춰 하이라이트 카드를 따라 누르세요.<br>1~3단계는 기본 연습, <span class="text-red-400 font-bold">4단계부터 극악의 속도</span>가 시작됩니다.</p>
        <button id="start-btn" onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-16 rounded-2xl text-xl shadow-2xl active:scale-95 transition-all duration-75">GAME START</button>
    </div>

    <script>
        // --- 동적 높이 계산 장치 ---
        function setScreenSize() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setScreenSize();
        window.addEventListener('resize', setScreenSize);
        window.addEventListener('orientationchange', setScreenSize);

        const FRUITS = [
            { id: 'apple', icon: '🍎' },
            { id: 'banana', icon: '🍌' },
            { id: 'grape', icon: '🍇' },
            { id: 'orange', icon: '🍊' }
        ];

        const LEVEL_CONFIG = {
            1: { bpm: 60, poolSize: 1 },  
            2: { bpm: 75, poolSize: 2 },  
            3: { bpm: 90, poolSize: 3 },  
            4: { bpm: 155, poolSize: 4 }, 
            5: { bpm: 210, poolSize: 4 }  
        };

        let state = {
            level: 1,
            sequence: [],
            currentIndex: 0,
            isPlaying: false,
            canInput: false,
            beatStartTime: 0,
            beatDuration: 0
        };

        const slots = document.querySelectorAll('.slot');
        const msgOverlay = document.getElementById('msg-overlay');
        const mainOverlay = document.getElementById('main-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        
        // 오디오 객체 가져오기
        const whistleAudio = document.getElementById('whistle-sound');

        // [변경] 시스템 소리 대신 실제 오디오 파일 재생으로 교체
        function playWhistle() {
            if (!whistleAudio) return;
            try {
                // 연속 재생 시 끊김 현상을 방지하기 위해 재생 위치를 즉시 0으로 초기화 후 재생
                whistleAudio.currentTime = 0;
                whistleAudio.play();
            } catch (e) {
                console.log("Audio play blocked:", e);
            }
        }

        function initButtons() {
            const container = document.getElementById('button-container');
            container.innerHTML = '';
            FRUITS.forEach(fruit => {
                const btn = document.createElement('div');
                btn.className = "fruit-card text-3xl font-bold cursor-pointer bg-slate-800/90 active:bg-slate-700 active:scale-95 active:border-slate-500 border border-slate-700/60 shadow-md";
                btn.innerHTML = fruit.icon;
                
                const triggerInput = (e) => {
                    e.preventDefault();
                    handleInput(fruit.id);
                };
                btn.addEventListener('touchstart', triggerInput, { passive: false });
                btn.addEventListener('mousedown', triggerInput);
                container.appendChild(btn);
            });
        }

        function startGame() {
            // 모바일 브라우저 오디오 오토플레이 차단 해제용 터치 활성화 조치
            if (whistleAudio) {
                whistleAudio.play().then(() => { whistleAudio.pause(); }).catch(()=>{});
            }
            
            mainOverlay.classList.add('hidden');
            state.level = 1;
            initButtons();
            startLevel();
        }

        async function startLevel() {
            state.isPlaying = false;
            updateStepTracker();
            state.sequence = generateSequence();
            
            slots.forEach((slot, i) => {
                slot.innerHTML = state.sequence[i].icon;
                slot.className = "slot fruit-card text-3xl font-bold";
            });

            await runCountdown();
            
            state.currentIndex = 0;
            state.isPlaying = true;
            state.beatDuration = 60000 / LEVEL_CONFIG[state.level].bpm;
            state.beatStartTime = performance.now();
            
            updateBeatHighlight();
            requestAnimationFrame(gameLoop);
        }

        function updateStepTracker() {
            for (let i = 1; i <= 5; i++) {
                const dot = document.getElementById(`step-${i}`);
                const line = document.getElementById(`line-${i}`);
                
                if (i === state.level) {
                    dot.className = "step-dot active";
                    dot.style.opacity = "1";
                } else if (i < state.level) {
                    dot.className = "step-dot bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.6)]";
                    dot.style.opacity = "0.6";
                    if (line) line.className = "step-line active bg-indigo-500/50";
                } else {
                    dot.className = "step-dot";
                    dot.style.opacity = "1";
                    if (line) line.className = "step-line";
                }
            }
        }

        function generateSequence() {
            const config = LEVEL_CONFIG[state.level];
            return Array(8).fill(null).map(() => FRUITS[Math.floor(Math.random() * config.poolSize)]);
        }

        function runCountdown() {
            return new Promise(resolve => {
                const counts = ['READY', 'SET', 'GO!'];
                let i = 0;
                const interval = 60000 / LEVEL_CONFIG[state.level].bpm;
                const playBeat = () => {
                    if (i < counts.length) {
                        msgOverlay.innerHTML = `<span class="animate-result inline-block text-yellow-400 font-black">${counts[i]}</span>`;
                        playWhistle();
                        i++;
                        setTimeout(playBeat, interval);
                    } else {
                        msgOverlay.innerText = '';
                        resolve();
                    }
                };
                playBeat();
            });
        }

        function updateBeatHighlight() {
            if (state.currentIndex >= 8) return;
            slots.forEach((s, idx) => {
                if(idx < state.currentIndex) {
                    s.className = "slot fruit-card text-3xl font-bold success-card";
                } else {
                    s.className = "slot fruit-card text-3xl font-bold";
                }
            });
            
            slots[state.currentIndex].classList.add('active-card');
            playWhistle();
            state.canInput = true;
        }

        function gameLoop(timestamp) {
            if (!state.isPlaying) return;
            const elapsed = timestamp - state.beatStartTime;

            if (elapsed >= state.beatDuration) {
                if (state.canInput) {
                    gameOver("박자를 놓쳤습니다!");
                    return;
                }
                state.beatStartTime += state.beatDuration;
                if (state.currentIndex >= 8) {
                    levelClear();
                } else {
                    updateBeatHighlight();
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function handleInput(id) {
            if (!state.isPlaying || !state.canInput) return;
            state.canInput = false;

            if (id === state.sequence[state.currentIndex].id) {
                if (navigator.vibrate) navigator.vibrate(15);
                slots[state.currentIndex].className = "slot fruit-card text-3xl font-bold success-card";
                state.currentIndex++;
            } else {
                gameOver("틀린 과일을 선택했습니다!");
            }
        }

        function levelClear() {
            state.isPlaying = false;
            slots.forEach(s => s.className = "slot fruit-card text-3xl font-bold success-card");
            msgOverlay.innerHTML = `<span class="animate-result text-green-400 font-black">STAGE CLEAR!</span>`;
            
            setTimeout(() => {
                msgOverlay.innerText = '';
                if (state.level < 5) {
                    state.level++;
                    startLevel();
                } else {
                    victory();
                }
            }, 1200);
        }

        function gameOver(reason) {
            state.isPlaying = false;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "text-4xl font-black text-red-500 mb-2 italic tracking-wide";
            overlayDesc.innerHTML = `${reason}<br><br><span class='text-slate-400 text-lg'>최종 통과 단계: <span class='text-yellow-400 font-black'>Level ${state.level}</span></span>`;
            document.getElementById('start-btn').innerText = "RETRY";
            mainOverlay.classList.remove('hidden');
        }

        function victory() {
            state.isPlaying = false;
            overlayTitle.innerText = "ALL CLEAR!";
            overlayTitle.className = "text-4xl font-black text-green-400 mb-2 italic tracking-wide animate-bounce";
            overlayDesc.innerHTML = "축하합니다!<br><span class='text-white text-xl font-bold'>당신은 진정한 리듬 마스터입니다!</span>";
            document.getElementById('start-btn').innerText = "PLAY AGAIN";
            mainOverlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
